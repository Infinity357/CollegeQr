<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Campus - QR Attendance</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/dashboard.css">
</head>
<body>

    <div class="sidebar">
        <div class="sidebar-header">
            <img src="images/logo.png" alt="Logo" onerror="this.src='https://cdn-icons-png.flaticon.com/512/3593/3593921.png'">
            <h2>Smart Campus</h2>
        </div>
        
        <ul>
            <li onclick="window.location='dashboard.html'">
                <i class="fa-solid fa-house"></i>
                <span>Dashboard</span>
            </li>
            <li onclick="window.location='profile.html'">
                <i class="fa-regular fa-id-card"></i>
                <span>Profile</span>
            </li>
            <li class="active" onclick="window.location='attendance.html'">
                <i class="fa-solid fa-qrcode"></i>
                <span>QR Attendance</span>
            </li>
            <li>
                <i class="fa-solid fa-clock-rotate-left"></i>
                <span>Entry Logs</span>
            </li>
            <li class="logout" onclick="window.location='index.html'">
                <i class="fa-solid fa-right-from-bracket"></i>
                <span>Logout</span>
            </li>
        </ul>
    </div>

    <div class="main">
        <div class="header">
            <h1>QR Access & Attendance</h1>
            <p>Scan this secure QR code at campus gates and lecture halls.</p>
        </div>

        <div class="qr-container">
            <div class="qr-box">
                <div id="qrcode"></div>
            </div>
            
            <p class="qr-instructions">
                This QR code securely identifies you as <strong>StudentID123</strong>. <br>
                It is dynamically generated and updates automatically.
            </p>
            
            <button class="refresh-btn" onclick="refreshQR()">
                <i class="fa-solid fa-rotate-right"></i> Refresh QR Code
            </button>
        </div>
    </div>

    <script>
        const qrContainer = document.getElementById("qrcode");

        async function fetchQRCode() {
            const studentData = JSON.parse(localStorage.getItem("currentStudent"));
            if (!studentData || !studentData.username) {
                return;
            }
            
            try {
                // Provide visual feedback during refresh
                qrContainer.style.opacity = '0.2';
                
                const response = await fetch(`/api/qr/generate?username=${studentData.username}`);
                const data = await response.json();
                
                if (response.ok && data.qrImage) {
                    qrContainer.innerHTML = `<img src="${data.qrImage}" alt="QR Code" style="width: 200px; height: 200px; display: block; margin: 0 auto;"/>`;
                    qrContainer.style.opacity = '1';
                } else {
                    console.error("Failed to fetch QR code:", data.error);
                    qrContainer.innerHTML = `<p style="color:red; text-align:center; padding-top: 80px;">Error loading QR</p>`;
                    qrContainer.style.opacity = '1';
                }
            } catch (error) {
                console.error("Error:", error);
                qrContainer.innerHTML = `<p style="color:red; text-align:center; padding-top: 80px;">Network Error</p>`;
                qrContainer.style.opacity = '1';
            }
        }

        function refreshQR() {
            fetchQRCode();
        }

        document.addEventListener("DOMContentLoaded", () => {
            const studentData = JSON.parse(localStorage.getItem("currentStudent"));
            if(studentData) {
                document.querySelector(".qr-instructions strong").innerText = studentData.roll;
                fetchQRCode();
            } else {
                window.location.href = "index.html";
            }
            
            // Set interval to automatically refresh QR every 30 seconds
            setInterval(refreshQR, 30000);
        });
    </script>
</body>
</html>
